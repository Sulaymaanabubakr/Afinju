---
deployment:
  tasks:
    # 1. Install dependencies and build the Vite React app
    - export PATH=/opt/cpanel/ea-nodejs20/bin:$PATH # Adjust Node.js path if needed
    - npm install
    - npm run build
    
    # 2. Copy the built files from 'dist' to your public_html folder
    # IMPORTANT: Replace 'username' with your actual cPanel username!
    - export DEPLOYPATH=/home/username/public_html
    - /bin/cp -R dist/. $DEPLOYPATH/
